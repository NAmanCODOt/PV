<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ancestor's Funnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080808;
            --text-color: #d4cbb8;
            --faint-color: #4a4a4a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            /* Subtle film grain effect overlay */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        #container {
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* The Input Screen */
        #intro {
            transition: opacity 2s ease-in-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: var(--faint-color);
        }

        input[type="date"] {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--faint-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            padding: 0.5rem;
            margin-bottom: 2rem;
            outline: none;
            cursor: pointer;
            text-align: center;
        }

        /* Hide default calendar icon for a cleaner look */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.3;
            cursor: pointer;
        }

        button {
            background: transparent;
            border: 1px solid var(--faint-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            padding: 0.8rem 2rem;
            cursor: pointer;
            transition: all 0.5s ease;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* The Cinematic Text Area */
        #story {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: none;
        }

        .story-line {
            font-size: 2.5rem;
            line-height: 1.4;
            opacity: 0;
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* The cinematic fade in, linger, and fade out animation */
        @keyframes breatheInOut {
            0% { opacity: 0; transform: translate(-50%, -45%); filter: blur(4px); }
            15% { opacity: 1; transform: translate(-50%, -50%); filter: blur(0px); }
            85% { opacity: 1; transform: translate(-50%, -50%); filter: blur(0px); }
            100% { opacity: 0; transform: translate(-50%, -55%); filter: blur(4px); }
        }

        .animate-line {
            animation: breatheInOut 7s forwards;
        }

        /* For the final line to stay on screen */
        @keyframes breatheInStay {
            0% { opacity: 0; transform: translate(-50%, -45%); filter: blur(4px); }
            100% { opacity: 1; transform: translate(-50%, -50%); filter: blur(0px); }
        }

        .animate-final {
            animation: breatheInStay 4s forwards;
        }
    </style>
</head>
<body>

    <div id="container">
        <!-- Input Phase -->
        <div id="intro">
            <h1>When did your story begin?</h1>
            <input type="date" id="bdate" required>
            <button id="start-btn">Remember</button>
        </div>

        <!-- Narrative Phase -->
        <div id="story"></div>
    </div>

    <script>
        document.getElementById('start-btn').addEventListener('click', function() {
            const dateInput = document.getElementById('bdate').value;
            if (!dateInput) return; // Wait for user to pick a date

            // Format the date beautifully
            const dob = new Date(dateInput);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = dob.toLocaleDateString('en-US', options);

            // Fade out the intro form
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';

            // Wait 2 seconds for fade out, then start the story
            setTimeout(() => {
                intro.style.display = 'none';
                startStory(formattedDate);
            }, 2000);
        });

        function startStory(dateStr) {
            const storyContainer = document.getElementById('story');
            storyContainer.style.display = 'block';

            // The emotional narrative
            const script = [
                `You were born on ${dateStr}.`,
                `But your story didn't start there.`,
                `For you to take your first breath, two people had to cross paths.`,
                `Four grandparents had to survive the mid-20th century.`,
                `Eight great-grandparents had to live through a world at war.`,
                `Go back just ten generations.`,
                `1,024 people.`,
                `Go back 400 years, to the early 1600s...`,
                `65,536 ancestors.`,
                `Farmers, soldiers, wanderers, lovers.`,
                `They survived plagues, crossed oceans, and fought through the darkest winters.`,
                `A fragile, unbroken chain of survival stretching across thousands of years.`,
                `All of them, funneling their hopes, their struggles, and their bloodlines...`,
                `Right down to you.`,
                `You are the surviving dream of a thousand generations.`,
                `Take a breath.`
            ];

            let delay = 0;
            const durationPerLine = 7000; // 7 seconds per sentence

            script.forEach((text, index) => {
                setTimeout(() => {
                    // Create a new paragraph for each line
                    const p = document.createElement('p');
                    p.className = 'story-line';
                    p.innerText = text;

                    // If it's the last line, it stays on screen forever. Otherwise, it fades out.
                    if (index === script.length - 1) {
                        p.classList.add('animate-final');
                    } else {
                        p.classList.add('animate-line');
                    }

                    // Clear previous lines to keep the DOM clean
                    storyContainer.innerHTML = ''; 
                    storyContainer.appendChild(p);

                }, delay);

                delay += durationPerLine;
            });
        }
    </script>
</body>
</html>
